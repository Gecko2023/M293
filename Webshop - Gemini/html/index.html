<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katja Brandis Fan-Shop | Woodwalkers & More</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">Brandis-Shop</div>
            <button class="menu-toggle" aria-label="Open Menu">☰</button>
            <nav class="main-nav">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Produkte</a></li>
                    <li><a href="#">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="products-section">
            <h2>Neue Produkte</h2>
            <div class="product-grid">
                <article class="product-card">
                    <div class="product-image"><span>COVER</span></div>
                    <div class="product-info">
                        <h4>Carags Verwandlung</h4>
                        <p class="price">14.99 €</p>
                        <button class="btn-view">Ansehen</button>
                    </div>
                </article>
                <article class="product-card">
                    <div class="product-image"><span>COVER</span></div>
                    <div class="product-info">
                        <h4>Gefährliche Freundschaft</h4>
                        <p class="price">14.99 €</p>
                        <button class="btn-view">Ansehen</button>
                    </div>
                </article>
                <article class="product-card">
                    <div class="product-image"><span>COVER</span></div>
                    <div class="product-info">
                        <h4>Holvys Kampf</h4>
                        <p class="price">14.99 €</p>
                        <button class="btn-view">Ansehen</button>
                    </div>
                </article>
            </div>
        </section>

        <hr class="divider">

        <section class="worlds-section">
            <h3>Entdecke die Welten</h3>
            <div class="worlds-flex">
                <a href="#" class="world-card woodwalkers">Woodwalkers</a>
                <a href="#" class="world-card seawalkers">Seawalkers</a>
                <a href="#" class="world-card windwalkers">Windwalkers</a>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <form class="newsletter-form">
                <div class="input-group">
                    <label for="fname">Vorname</label>
                    <input type="text" id="fname" name="firstname" placeholder="Name" required>
                </div>
                <div class="input-group">
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email" placeholder="E-Mail" required>
                </div>
                <button type="submit" class="btn-submit">Abonnieren</button>
            </form>
            <p class="copyright">© 2026 Katja Brandis Fan-Shop</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
